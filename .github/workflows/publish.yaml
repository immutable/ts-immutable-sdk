name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      release_type:
        type: choice
        description: Release Type
        options:
          - prerelease
          - prepatch
          - preminor
          - premajor
          - patch
          - minor
          - major
        required: true
        default: prerelease
      dry_run:
        type: boolean
        description: "(Optional) Dry run"
        required: false
        default: false
  push:
    branches:
      - main

permissions: {}

env:
  RELEASE_TYPE: ${{ github.event.inputs.release_type || 'prerelease' }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.release_type }}
  cancel-in-progress: false

jobs:
  Publish:
    name: Publish Workflow
    runs-on: ubuntu-latest-4-cores
    environment: npm-publish
    permissions:
      id-token: write # Required for GitHub Attestations and npm OIDC trusted publishing
      attestations: write # ! Required for GitHub Attestations, removing will create a Sev 0 incident !
      contents: write # Required for git tag push and GitHub release creation
    env:
      NODE_OPTIONS: --max-old-space-size=14366
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.TS_IMMUTABLE_SDK_NX_TOKEN }}
    steps:
      - name: Check Public Release Branch
        if: ${{ !startsWith(env.RELEASE_TYPE, 'pre') && github.ref != 'refs/heads/main' }}
        env:
          CURRENT_REF: ${{ github.ref }}
        shell: bash
        run: |
          echo "Public releases can only be executed from the main branch, current branch $CURRENT_REF"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          token: ${{ github.token }}
          persist-credentials: true # required: git tag push after version bump

      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-cache: "false"

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Setup Github
        shell: bash
        run: |
          git config user.name "platform-sa"
          git config user.email "platform-sa@users.noreply.github.com"

      - name: Initialize current versions
        shell: bash
        run: pnpm --filter @imtbl/sdk... --filter @imtbl/checkout-widgets... --filter @imtbl/audience... exec sh -c "jq --arg version \"$(npm view @imtbl/metrics versions --json | jq -r '.[-1]')\" '.version = \$version' package.json > package.tmp.json && mv package.tmp.json package.json"

      - name: Setup new package versions
        shell: bash
        run: |
          args=(--specifier "$RELEASE_TYPE")
          [[ "$DRY_RUN" == "true" ]] && args+=(--dry-run)
          pnpm nx release version "${args[@]}"

      - name: Read SDK version
        id: sdk_version
        shell: bash
        run: echo "SDK_VERSION=$(jq -r '.version' ./sdk/package.json)" >> "$GITHUB_OUTPUT"

      - name: Build SDK, Checkout Widgets & Audience
        shell: bash
        run: pnpm build

      - name: Pack SDK, Checkout Widgets & Audience packages and dependencies
        shell: bash
        run: pnpm pack-npm-packages

      # ! Do NOT remove any of these attestation subject paths - this will cause a Sev 0 incident !

      - name: Generate SDK Package Attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # pin@v4.1.0
        with:
          subject-path: ./imtbl-*.tgz

      - name: Publish Github Release
        if: ${{ !startsWith(env.RELEASE_TYPE, 'pre') }}
        env:
          SDK_VERSION: ${{ steps.sdk_version.outputs.SDK_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          args=("$SDK_VERSION")
          [[ "$DRY_RUN" == "true" ]] && args+=(--dry-run)
          pnpm nx release changelog "${args[@]}"

      - name: Release to NPM
        id: npm_release
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_ALPHA: ${{ github.event_name == 'push' || startsWith(env.RELEASE_TYPE, 'pre') }}
        shell: bash
        run: |
          args=()
          [[ "$DRY_RUN" == "true" ]] && args+=(--dry-run)
          [[ "$IS_ALPHA" == "true" ]] && args+=(--tag alpha)
          pnpm nx release publish "${args[@]}"

      - name: Tag Git Pre-Release
        if: ${{ startsWith(env.RELEASE_TYPE, 'pre') && steps.npm_release.conclusion == 'success' && env.DRY_RUN == 'false' }}
        env:
          SDK_VERSION: ${{ steps.sdk_version.outputs.SDK_VERSION }}
        shell: bash
        run: |
          git tag -a "prelease-$SDK_VERSION" -m "$SDK_VERSION"
          git push origin "prelease-$SDK_VERSION"

      - name: Warm up CDN
        id: warm_up_cdn
        if: ${{ !startsWith(env.RELEASE_TYPE, 'pre') }}
        shell: bash
        run: |
          wget https://cdn.jsdelivr.net/npm/@imtbl/checkout-widgets/dist/browser/index.js


      - name: Notify SDK Slack Publish Success
        if: ${{ success() && (steps.npm_release.conclusion == 'success') && env.DRY_RUN == 'false' }}
        uses: ./.github/actions/notify-slack-publish-status
        with:
          webhook: ${{ secrets.SDK_PUBLISH_SLACK_WEBHOOK }}
          message: "✅ ${{ github.triggering_actor }} successfully published SDK packages @ version ${{steps.sdk_version.outputs.SDK_VERSION}} to NPM.\n\nhttps://www.npmjs.com/package/@imtbl/sdk/v/${{steps.sdk_version.outputs.SDK_VERSION}}"

      - name: Notify SDK Slack Publish Failure
        if: ${{ failure() && (steps.npm_release.conclusion == 'failure') && env.DRY_RUN == 'false' }}
        uses: ./.github/actions/notify-slack-publish-status
        with:
          webhook: ${{ secrets.SDK_PUBLISH_SLACK_WEBHOOK }}
          message: "❌ Failed to publish SDK version ${{steps.sdk_version.outputs.SDK_VERSION}} to NPM. ${{ github.triggering_actor }} please check the logs for more details."

      - name: Wait for NPM @latest Update
        id: wait_for_npm_update
        if: ${{ !startsWith(env.RELEASE_TYPE, 'pre') && github.event_name != 'push' && env.DRY_RUN == 'false' }}
        env:
          IS_PRERELEASE: ${{ startsWith(env.RELEASE_TYPE, 'pre') }}
          SDK_VERSION: ${{ steps.sdk_version.outputs.SDK_VERSION }}
        shell: bash
        run: |
          echo "Waiting for NPM registry to reflect version: $SDK_VERSION"

          for _ in {1..20}; do
            LATEST_VERSION=$(if [[ "$IS_PRERELEASE" == "true" ]]; then npm view @imtbl/sdk@alpha version; else npm view @imtbl/checkout-widgets@latest version; fi)
            if [[ "$LATEST_VERSION" == "$SDK_VERSION" ]]; then
              echo "NPM registry updated to version: $LATEST_VERSION"
              exit 0
            fi
            echo "NPM registry not updated yet, retrying in 15 seconds..."
            sleep 15
          done

          echo "NPM registry failed to update after 5 minutes."
          exit 1

      - name: Purge CDN Cache for Checkout Widgets
        id: purge_cdn
        if: ${{ !startsWith(env.RELEASE_TYPE, 'pre') && env.DRY_RUN == 'false' }}
        shell: bash
        run: |
          curl -X GET https://purge.jsdelivr.net/npm/@imtbl/checkout-widgets@latest
          echo "CDN cache purged for https://cdn.jsdelivr.net/npm/@imtbl/checkout-widgets@latest"
