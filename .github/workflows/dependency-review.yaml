name: 'Dependency Review'
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # read PR diff for dependency analysis
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # pin@v5.0.0
        with:
          # Possible values: "critical", "high", "moderate", "low"
          fail-on-severity: critical
          # Address https://github.com/actions/dependency-review-action/issues/456
          base-ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}
          head-ref: ${{ github.event.pull_request.head.sha || github.ref }}
